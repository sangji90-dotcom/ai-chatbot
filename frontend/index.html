<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 캐릭터 선택 -->
        <div class="character-select" id="characterSelect">
            <h1>누구와 대화할까요?</h1>
            <div class="character-list" id="characterList"></div>
        </div>

        <!-- 채팅 화면 -->
        <div class="chat-container" id="chatContainer" style="display:none">
            <div class="chat-header">
                <button class="back-btn" onclick="goBack()">← 뒤로</button>
                <span id="characterName"></span>
                <button class="clear-btn" onclick="clearChat()">대화 초기화</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
