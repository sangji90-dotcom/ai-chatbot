<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- 캐릭터 선택 화면 -->
        <div class="character-select" id="characterSelect">
            <h1>누구와 대화할까요?</h1>
            <button class="create-btn" onclick="showCreateForm()">+ 캐릭터 만들기</button>
            <div class="character-list" id="characterList"></div>
        </div>

        <!-- 캐릭터 만들기 화면 -->
        <div class="create-form" id="createForm" style="display:none">
            <div class="form-header">
                <button class="back-btn" onclick="hideCreateForm()">← 뒤로</button>
                <span>캐릭터 만들기</span>
            </div>

            <!-- 탭 -->
            <div class="tab-bar">
                <button class="tab-btn active" onclick="showTab('tab-profile')">프로필</button>
                <button class="tab-btn" onclick="showTab('tab-detail')">상세정보</button>
                <button class="tab-btn" onclick="showTab('tab-situation')">시작상황</button>
                <button class="tab-btn" onclick="showTab('tab-setting')">기타설정</button>
            </div>

            <!-- 프로필 탭 -->
            <div class="tab-content" id="tab-profile">
            <div class="form-body">
        
            <!-- 이미지 업로드 -->
                <div class="form-group">
                    <label>캐릭터 이미지</label>
                <div class="image-upload-area" onclick="document.getElementById('imageInput').click()">
                    <img id="imagePreview" src="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:12px;">
                <div id="imageUploadPlaceholder">
                    <div style="font-size:32px">📷</div>
                    <div style="font-size:13px; color:#aaa; margin-top:8px">이미지 업로드</div>
                </div>
            </div>
                <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage(event)">
            </div>

            <div class="form-group">
                <label>이름 *</label>
                <input type="text" id="charName" placeholder="캐릭터 이름을 입력해주세요" maxlength="20">
            </div>
            <div class="form-group">
                <label>캐릭터 소개</label>
            <textarea id="charDescription" placeholder="캐릭터에 대한 소개를 간단하게 입력해주세요" maxlength="500"></textarea>
            </div>
            <div class="form-group">
                <label>나이</label>
            <input type="number" id="charAge" placeholder="예: 22">
            </div>
                <div class="form-group">
                    <label>직업</label>
                <input type="text" id="charJob" placeholder="예: 대학생, 회사원">
            </div>
            <button class="tab-next-btn" onclick="showTab('tab-detail')">다음 단계 →</button>
        </div>
    </div>

            <!-- 상세정보 탭 -->
            <div class="tab-content" id="tab-detail" style="display:none">
                <div class="form-body">
                    <div class="form-group">
                        <label>성격 *</label>
                        <textarea id="charPersonality" placeholder="예: 활발하고 긍정적임, 가끔 엉뚱한 소리를 함&#10;외모, 배경 스토리 등도 여기에 입력해주세요"></textarea>
                    </div>
                    <div class="form-group">
                        <label>좋아하는 것</label>
                        <input type="text" id="charLikes" placeholder="예: 카페, 드라마, 강아지">
                    </div>
                    <div class="form-group">
                        <label>싫어하는 것</label>
                        <input type="text" id="charDislikes" placeholder="예: 시끄러운 곳, 거짓말">
                    </div>
                    <div class="form-group">
                        <label>말투 *</label>
                        <textarea id="charSpeech" placeholder="예: 반말, 이모티콘 자주 씀, 친근한 말투"></textarea>
                    </div>
                    <button class="tab-next-btn" onclick="showTab('tab-situation')">다음 단계 →</button>
                </div>
            </div>

            <!-- 시작상황 탭 -->
            <div class="tab-content" id="tab-situation" style="display:none">
                <div class="form-body">
                    <div class="form-group">
                        <label>시작 상황</label>
                        <textarea id="charSituation" placeholder="예: 카페에서 처음 만난 상황&#10;캐릭터와 유저의 첫 만남을 설정해주세요" maxlength="1000"></textarea>
                    </div>
                    <div class="form-group">
                        <label>첫 대사</label>
                        <textarea id="charFirstMessage" placeholder="예: 어, 여기 자리 있어요? 저도 괜찮으면 같이 앉아도 될까요?&#10;캐릭터가 처음 건네는 말을 입력해주세요" maxlength="500"></textarea>
                    </div>
                    <button class="tab-next-btn" onclick="showTab('tab-setting')">다음 단계 →</button>
                </div>
            </div>

            <!-- 기타설정 탭 -->
            <div class="tab-content" id="tab-setting" style="display:none">
                <div class="form-body">
                    <div class="form-group">
                        <label>카테고리</label>
                        <div class="category-grid">
                            <button class="category-btn" onclick="selectCategory(this, '시뮬레이션')">시뮬레이션</button>
                            <button class="category-btn" onclick="selectCategory(this, '로맨스')">로맨스</button>
                            <button class="category-btn" onclick="selectCategory(this, '판타지/SF')">판타지/SF</button>
                            <button class="category-btn" onclick="selectCategory(this, '드라마')">드라마</button>
                            <button class="category-btn" onclick="selectCategory(this, '무협/사극')">무협/사극</button>
                            <button class="category-btn" onclick="selectCategory(this, '코믹/일상')">코믹/일상</button>
                            <button class="category-btn" onclick="selectCategory(this, '공포/추리')">공포/추리</button>
                            <button class="category-btn" onclick="selectCategory(this, '기타')">기타</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>공개 설정</label>
                        <div class="visibility-group">
                            <button class="visibility-btn selected" data-value="public" onclick="selectVisibility(this, 'public')">공개</button>
                            <button class="visibility-btn" data-value="private" onclick="selectVisibility(this, 'private')">비공개</button>
                        </div>
                    </div>
                    <button class="submit-btn" onclick="createCharacter()">캐릭터 생성 완료</button>
                </div>
            </div>
        </div>

        <!-- 채팅 화면 -->
        <div class="chat-container" id="chatContainer" style="display:none">
            <div class="chat-header">
                <button class="back-btn" onclick="goBack()">← 뒤로</button>
                <span id="characterName"></span>
                <button class="clear-btn" onclick="clearChat()">초기화</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">전송</button>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
